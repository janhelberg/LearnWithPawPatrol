<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1565c0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>Shapes – Learn With Paw Patrol</title>

  <link rel="manifest" href="../../manifest.json" />
  <link rel="stylesheet" href="../../css/style.css" />

  <style>
        body {
          background: #fffbe8 !important;
        }
    .canvas-wrap { max-width: 380px; }

    .choice-btn {
      background: #ffffff;
      color: #1565c0;
      border: 3px solid #1565c0;
      font-size: clamp(1rem, 3vw, 1.2rem);
    }

    .choice-btn:hover  { background: #e3f2fd; }
    .choice-btn.correct   { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }
    .choice-btn.incorrect { background: #ffebee; border-color: #c62828; color: #c62828; }
  </style>
</head>
<body>

  <header class="site-header">
    <a class="back-btn" href="../../index.html" aria-label="Back to main menu">← Menu</a>
  </header>

  <main>
    <div class="game-solid-bg">
      <h1>Shapes</h1>

      <!-- Score bar -->
      <div class="score-bar" role="status" aria-live="polite">
        <span class="score-badge" id="scoreDisplay">⭐ 0 / 0</span>
      </div>

      <!-- Instruction -->
      <p class="instruction" id="instruction" aria-live="polite">Loading…</p>

      <!-- Canvas shape display -->
      <div class="canvas-wrap">
        <canvas id="shapeCanvas" width="380" height="320"
                aria-label="Shape to identify"></canvas>
      </div>

      <!-- Feedback -->
      <p class="feedback" id="feedback" aria-live="assertive"></p>

      <!-- Answer buttons -->
      <div class="choices" id="choices" role="group" aria-label="Shape choices"></div>
    </div>
  </main>

  <!-- Shared utilities -->
  <script src="../../shared/responsive-scaling.js"></script>
  <script src="../../shared/game-common.js"></script>

  <script>
    /* =========================================================
       Shapes Game
       =========================================================
       Rounds: a shape is drawn on canvas.
       Player taps the button with the matching shape name.
       Uses Web Speech API to announce the target shape.
    ========================================================= */

    const SHAPES = [
      { name: 'Circle',    draw: drawCircle    },
      { name: 'Square',    draw: drawSquare    },
      { name: 'Triangle',  draw: drawTriangle  },
      { name: 'Rectangle', draw: drawRectangle },
      { name: 'Star',      draw: drawStar      },
      { name: 'Heart',     draw: drawHeart     },
      { name: 'Diamond',   draw: drawDiamond   },
      { name: 'Oval',      draw: drawOval      },
    ];

    const GAME_ID    = 'shapes';
    const NUM_CHOICES = 4;
    const FILL_COLOR  = '#1e88e5';
    const STROKE_COLOR = '#0d47a1';

    // DOM refs
    const canvas      = document.getElementById('shapeCanvas');
    const ctx         = canvas.getContext('2d');
    const instruction = document.getElementById('instruction');
    const feedback    = document.getElementById('feedback');
    const choicesEl   = document.getElementById('choices');
    const scoreEl     = document.getElementById('scoreDisplay');

    // Responsive scaling
    ResponsiveScaling.initCanvas(canvas, 380, 320);

    // Game state
    let score  = GameCommon.loadScore(GAME_ID);
    let target = null;
    let locked = false;

    /* ============================================================
       Shape-drawing functions
       All shapes are drawn centred on the canvas.
    ============================================================ */

    function applyStyle() {
      ctx.fillStyle   = FILL_COLOR;
      ctx.strokeStyle = STROKE_COLOR;
      ctx.lineWidth   = 6;
      ctx.shadowColor   = 'rgba(0,0,0,0.2)';
      ctx.shadowBlur    = 14;
      ctx.shadowOffsetY = 5;
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.shadowColor = 'transparent';
    }

    function drawCircle() {
      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;
      applyStyle();
      ctx.beginPath();
      ctx.arc(cx, cy, 110, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }

    function drawSquare() {
      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;
      const s  = 200;
      applyStyle();
      ctx.beginPath();
      ctx.rect(cx - s / 2, cy - s / 2, s, s);
      ctx.fill();
      ctx.stroke();
    }

    function drawTriangle() {
      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;
      applyStyle();
      ctx.beginPath();
      ctx.moveTo(cx,          cy - 130);
      ctx.lineTo(cx + 150,    cy + 120);
      ctx.lineTo(cx - 150,    cy + 120);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    function drawRectangle() {
      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;
      const w  = 260, h = 150;
      applyStyle();
      ctx.beginPath();
      ctx.rect(cx - w / 2, cy - h / 2, w, h);
      ctx.fill();
      ctx.stroke();
    }

    function drawStar() {
      const cx     = canvas.width  / 2;
      const cy     = canvas.height / 2;
      const spikes = 5;
      const outerR = 130;
      const innerR = 55;
      applyStyle();
      ctx.beginPath();
      for (let i = 0; i < spikes * 2; i++) {
        const angle = (i * Math.PI) / spikes - Math.PI / 2;
        const r     = i % 2 === 0 ? outerR : innerR;
        const x     = cx + Math.cos(angle) * r;
        const y     = cy + Math.sin(angle) * r;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    function drawHeart() {
      const cx = canvas.width  / 2;
      const cy = canvas.height / 2 + 20;
      const s  = 100;
      applyStyle();
      ctx.beginPath();
      ctx.moveTo(cx, cy + s * 0.6);
      // Left curve
      ctx.bezierCurveTo(cx - s * 1.5, cy - s * 0.4,
                        cx - s * 1.5, cy - s * 1.1,
                        cx,           cy - s * 0.45);
      // Right curve
      ctx.bezierCurveTo(cx + s * 1.5, cy - s * 1.1,
                        cx + s * 1.5, cy - s * 0.4,
                        cx,           cy + s * 0.6);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    function drawDiamond() {
      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;
      applyStyle();
      ctx.beginPath();
      ctx.moveTo(cx,       cy - 140);
      ctx.lineTo(cx + 110, cy);
      ctx.lineTo(cx,       cy + 140);
      ctx.lineTo(cx - 110, cy);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    function drawOval() {
      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;
      applyStyle();
      ctx.beginPath();
      ctx.ellipse(cx, cy, 155, 100, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }

    /* ---- Render choice buttons ---- */
    function renderChoices(pool) {
      choicesEl.innerHTML = '';
      const shuffled = GameCommon.shuffle([...pool]);
      shuffled.forEach(shape => {
        const btn = document.createElement('button');
        btn.className   = 'choice-btn';
        btn.textContent = shape.name;
        btn.dataset.name = shape.name;
        btn.addEventListener('click', () => onAnswer(shape, btn));
        btn.addEventListener('touchend', e => {
          e.preventDefault();
          onAnswer(shape, btn);
        }, { passive: false });
        choicesEl.appendChild(btn);
      });
    }

    /* ---- Start a new round ---- */
    function newRound() {
      locked  = false;
      feedback.textContent = '';

      const pool = GameCommon.pickRandomN(SHAPES, NUM_CHOICES);
      target     = pool[0];

      clearCanvas();
      target.draw();

      instruction.textContent = `What shape is this?`;
      renderChoices(pool);

      GameCommon.speak(`What shape is this? Find the ${target.name}!`);
      GameCommon.playTone('start', 0.2);
    }

    /* ---- Handle answer ---- */
    function onAnswer(shape, btn) {
      if (locked) return;
      locked = true;

      score.total++;
      const correct = shape.name === target.name;

      if (correct) {
        score.correct++;
        btn.classList.add('correct');
        feedback.textContent = `🎉 Yes! That's a ${target.name}!`;
        GameCommon.speak(`Yes! That's a ${target.name}! Great job!`);
        GameCommon.playTone('correct');
      } else {
        btn.classList.add('incorrect');
        choicesEl.querySelectorAll('.choice-btn').forEach(b => {
          if (b.dataset.name === target.name) b.classList.add('correct');
        });
        feedback.textContent = `Almost! It was a ${target.name}.`;
        GameCommon.speak(`Almost! It was a ${target.name}.`);
        GameCommon.playTone('incorrect');
      }

      scoreEl.textContent = `⭐ ${score.correct} / ${score.total}`;
      GameCommon.saveScore(GAME_ID, score);

      setTimeout(newRound, 1800);
    }

    /* ---- Init ---- */
    scoreEl.textContent = `⭐ ${score.correct} / ${score.total}`;
    newRound();
  </script>

</body>
</html>
